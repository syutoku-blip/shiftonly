<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン</title>
<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0}
.wrap{max-width:420px;margin:80px auto;background:#fff;padding:30px;border-radius:16px}
h1{text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
button{width:100%;margin-top:15px;padding:12px;border:none;border-radius:999px;background:#2f6df6;color:#fff;font-weight:bold;cursor:pointer}
.tab{display:flex;margin-bottom:20px}
.tab button{flex:1;background:#eee;color:#333}
.tab button.active{background:#2f6df6;color:#fff}
.message{margin-top:10px;font-size:14px}
</style>
</head>
<body>

<div class="wrap">
  <h1>ログイン / 新規登録</h1>

  <div class="tab">
    <button id="tabLogin" class="active">ログイン</button>
    <button id="tabRegister">新規登録</button>
  </div>

  <input id="memberNo" placeholder="会員番号">
  <input id="memberName" placeholder="氏名">

  <button id="submitBtn">ログインする</button>

  <div id="message" class="message"></div>
</div>

<script src="auth.js"></script>
<script>
let mode = "login";
const nextUrl = new URLSearchParams(location.search).get("next") || "products.html";

const tabLogin = document.getElementById("tabLogin");
const tabRegister = document.getElementById("tabRegister");
const btn = document.getElementById("submitBtn");
const msg = document.getElementById("message");

tabLogin.onclick = () => {
  mode = "login";
  tabLogin.classList.add("active");
  tabRegister.classList.remove("active");
  btn.textContent = "ログインする";
};

tabRegister.onclick = () => {
  mode = "register";
  tabRegister.classList.add("active");
  tabLogin.classList.remove("active");
  btn.textContent = "新規登録する";
};

btn.onclick = async () => {
  const no = document.getElementById("memberNo").value.trim();
  const name = document.getElementById("memberName").value.trim();

  msg.textContent = "処理中...";

  try {
    let res;

    if (mode === "register") {
      res = await SHIFT_AUTH.register(no, name);
    } else {
      res = await SHIFT_AUTH.login(no, name);
    }

    if (!res.ok) {
      msg.textContent = res.message;
      return;
    }

    msg.textContent = "成功！ページ遷移します";
    setTimeout(()=>location.href=nextUrl,500);

  } catch(e){
    msg.textContent = "エラー";
  }
};
</script>
</body>
</html>
