<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHiFT MEMBERS MARKET | 商材一覧</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--text:#182033;--muted:#667085;--line:#dbe5f3;--blue:#2f6df6;--shadow:0 18px 40px rgba(47,109,246,.10)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,"Noto Sans JP",sans-serif;color:var(--text);background:radial-gradient(circle at 0% 0%,#e6f0ff 0%,transparent 28%),radial-gradient(circle at 100% 0%,#e4fff6 0%,transparent 24%),linear-gradient(180deg,#f6f9ff 0%,#fbfdff 48%,#ffffff 100%)}
    .container{width:min(1180px,calc(100% - 32px));margin:auto} header{position:sticky;top:0;z-index:30;backdrop-filter:blur(12px);background:rgba(255,255,255,.76);border-bottom:1px solid rgba(219,229,243,.9)}
    .nav{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{display:flex;align-items:center;gap:12px}.mark{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:20px;background:linear-gradient(135deg,var(--blue),#57a1ff);box-shadow:0 12px 24px rgba(47,109,246,.22)}
    .brand small{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5e8dff;font-weight:800}.brand strong{display:block;font-size:19px;letter-spacing:-.03em}
    nav ul{display:flex;gap:24px;list-style:none;padding:0;margin:0}nav a{text-decoration:none;color:var(--muted);font-weight:700;font-size:14px}nav a:hover,nav a.active{color:var(--text)}
    .btn{border:none;cursor:pointer;border-radius:999px;padding:13px 18px;font-weight:800;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.sub{background:#fff;border:1px solid var(--line);color:var(--text)}
    .page-hero{padding:34px 0 14px}.hero-main{background:linear-gradient(135deg,#ffffff 0%,#f4f9ff 52%,#eef7ff 100%);border:1px solid var(--line);border-radius:32px;padding:28px;box-shadow:var(--shadow)}.eyebrow{color:#5f7de5;font-size:12px;text-transform:uppercase;letter-spacing:.18em;font-weight:900}h1{margin:12px 0 14px;font-size:clamp(36px,5vw,58px);line-height:.98;letter-spacing:-.06em}.page-hero p{margin:0;max-width:760px;color:var(--muted);line-height:1.9;font-size:15px}
    .section-card{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:var(--shadow);margin:20px 0 40px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;flex-wrap:wrap;margin-bottom:18px}.section-head .sub{color:#5a7eff;font-size:12px;text-transform:uppercase;letter-spacing:.18em;font-weight:900}.section-head h2{margin:8px 0 0;font-size:32px;letter-spacing:-.05em}.section-head p{margin:8px 0 0;color:var(--muted);line-height:1.8;font-size:14px}.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.product-link{text-decoration:none;color:inherit;display:block}.product{background:#fff;border:1px solid var(--line);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);height:100%}.visual{height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.9),transparent 20%),linear-gradient(135deg,#eef6ff 0%,#ffffff 52%,#e8fff7 100%)}.badge{position:absolute;left:14px;top:14px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;color:#596579}.body{padding:18px}.meta{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:#7793d7;font-weight:900}.product h4{margin:10px 0 10px;font-size:22px;letter-spacing:-.04em}.product p{margin:0;color:var(--muted);line-height:1.75;font-size:14px;min-height:72px}.bottom{display:flex;justify-content:space-between;align-items:end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid #edf2f8}.price{font-size:28px;font-weight:900;letter-spacing:-.04em}.small{font-size:12px;color:var(--muted);margin-top:4px}.score{background:#f4f8ff;color:#5d6980;border:1px solid var(--line);border-radius:16px;padding:10px 12px;font-weight:900;font-size:13px}
    .loading,.empty{padding:22px;background:#fff;border:1px solid var(--line);border-radius:24px;color:var(--muted)} footer{text-align:center;padding:24px 0 40px;color:#8b95a7;font-size:13px}
    @media(max-width:980px){.product-grid{grid-template-columns:1fr}} @media(max-width:760px){nav{display:none}}
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <div class="brand"><div class="mark">S</div><div><small>members wholesale</small><strong>SHiFT MEMBERS MARKET</strong></div></div>
    <nav><ul><li><a href="index.html">TOP</a></li><li><a href="products.html" class="active">商材一覧</a></li></ul></nav>
    <a class="btn sub" data-auth-button href="login.html">ログイン</a>
  </div>
</header>
<main>
  <section class="page-hero"><div class="container"><div class="hero-main"><div class="eyebrow">products</div><h1>商材一覧</h1><p>スプレッドシートの「商材」で始まる各シートを固定セル位置で読み込み、一覧に反映しています。</p></div></div></section>
  <section><div class="container"><div class="section-card"><div class="section-head"><div><div class="sub">now listing</div><h2>出品中商材</h2><p>シート記載内容をそのまま反映しています。</p></div></div><div id="loading" class="loading">商材を読み込み中...</div><div id="empty" class="empty" style="display:none;">商材シートが見つかりません。</div><div id="productGrid" class="product-grid" style="display:none;"></div></div></div></section>
</main>
<footer>© SHiFT MEMBERS MARKET</footer>
<script src="auth.js"></script>
<script>
(function(){
  const loadingEl=document.getElementById('loading');
  const emptyEl=document.getElementById('empty');
  const gridEl=document.getElementById('productGrid');
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function render(items){
    loadingEl.style.display='none';
    if(!items.length){emptyEl.style.display='block';return;}
    gridEl.style.display='grid';
    gridEl.innerHTML=items.map(function(item){
      return '<a class="product-link" href="product-detail.html?id='+encodeURIComponent(item.productId)+'"><div class="product">'
        +'<div class="visual"><div class="badge">'+esc(item.isFirstRecruit ? '初回募集' : '募集中')+'</div>'+esc(item.emoji||'📦')+'</div>'
        +'<div class="body"><div class="meta">'+esc(item.category||'category')+'</div><h4>'+esc(item.productName||'')+'</h4><p>'+esc(item.summary||'')+'</p>'
        +'<div class="bottom"><div><div class="price">'+esc(item.price||'要確認')+'</div><div class="small">MOQ '+esc(item.moq||'')+'</div></div><div class="score">詳細へ ↗</div></div>'
        +'</div></div></a>';
    }).join('');
  }
  window.SHIFT_AUTH.getProducts().then(function(res){ if(!res.ok) throw new Error(res.message||'商材の取得に失敗しました。'); render(res.items||[]); }).catch(function(err){ loadingEl.textContent=err.message||'商材の取得に失敗しました。'; });
})();
</script>
</body>
</html>
