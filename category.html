<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カテゴリ一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--text:#182033;--muted:#667085;--line:#dbe5f3}
body{margin:0;font-family:Inter,"Noto Sans JP",sans-serif;background:#f6f9ff}
.container{width:min(1100px,calc(100% - 32px));margin:auto}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  cursor:pointer;
}
.card:hover{transform:translateY(-2px)}

h1{margin-top:30px}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">カテゴリ一覧</h1>
  <div id="grid" class="grid"></div>
</div>

<script src="auth.js"></script>
<script>
(async function(){

  const params = new URLSearchParams(location.search);
  const targetCategory = params.get('category');

  const res = await window.SHIFT_AUTH.getCatalog();
  const items = res.items || [];

  const grid = document.getElementById('grid');
  const title = document.getElementById('title');

  if (!targetCategory) {
    // 🔥 全カテゴリ表示
    const map = {};

    items.forEach(i=>{
      if(!map[i.category]) map[i.category]=0;
      map[i.category]++;
    });

    grid.innerHTML = Object.keys(map).map(c=>`
      <div class="card" onclick="location.href='category.html?category=${encodeURIComponent(c)}'">
        <strong>${c}</strong><br>
        ${map[c]}件
      </div>
    `).join('');

  } else {
    // 🔥 特定カテゴリ
    title.textContent = targetCategory;

    const filtered = items.filter(i=>i.category===targetCategory);

    grid.innerHTML = filtered.map(i=>`
      <div class="card" onclick="location.href='product-detail.html?id=${i.productId}'">
        ${i.productName}
      </div>
    `).join('');
  }

})();
</script>

</body>
</html>
