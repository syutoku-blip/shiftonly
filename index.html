<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHiFT MEMBERS MARKET</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--text:#182033;--muted:#667085;--line:#dbe5f3;--blue:#2f6df6;--shadow:0 18px 40px rgba(47,109,246,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,"Noto Sans JP",sans-serif;color:var(--text);background:#f6f9ff}
.container{width:min(1100px,calc(100% - 32px));margin:auto}

header{background:#fff;border-bottom:1px solid var(--line)}
.nav{height:70px;display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:900}

.link{font-weight:800;color:#667085;text-decoration:none}
.link:hover{transform:translateX(2px)}

.section{margin-top:30px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.card{border:1px solid var(--line);border-radius:16px;padding:16px}
</style>
</head>

<body>

<header>
  <div class="container nav">
    <div class="brand">SHiFT MEMBERS MARKET</div>
    <a href="products.html">商材一覧</a>
  </div>
</header>

<main class="container">

  <!-- カテゴリ一覧 -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;">
      <h2>カテゴリ一覧</h2>
      <a class="link" href="category.html">すべて見る →</a>
    </div>

    <div id="categoryGrid" class="grid"></div>
  </div>

  <!-- 商品一覧 -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;">
      <h2>出品中商材</h2>
      <a class="link" href="products.html">すべて見る →</a>
    </div>

    <div id="productGrid" class="grid"></div>
  </div>

</main>

<script src="auth.js"></script>
<script>
(async function(){
  const catGrid = document.getElementById('categoryGrid');
  const prodGrid = document.getElementById('productGrid');

  const res = await window.SHIFT_AUTH.getCatalog();
  const items = res.items || [];

  // カテゴリ生成
  const map = {};
  items.forEach(i=>{
    if(!map[i.category]) map[i.category]=0;
    map[i.category]++;
  });

  catGrid.innerHTML = Object.keys(map).map(c=>`
    <div class="card">
      ${c}<br>${map[c]}件
    </div>
  `).join('');

  // 商品（3件だけ）
  prodGrid.innerHTML = items.slice(0,3).map(i=>`
    <div class="card">
      ${i.productName}
    </div>
  `).join('');
})();
</script>

</body>
</html>
