<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHiFT MEMBERS MARKET</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --text:#182033;
      --muted:#667085;
      --line:#dbe5f3;
      --blue:#2f6df6;
      --shadow:0 18px 40px rgba(47,109,246,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, #e6f0ff 0%, transparent 28%),
        radial-gradient(circle at 100% 0%, #e4fff6 0%, transparent 24%),
        linear-gradient(180deg,#f6f9ff 0%,#fbfdff 48%,#ffffff 100%);
    }

    .container{width:min(1120px,calc(100% - 32px));margin:auto}

    header{
      position:sticky;top:0;z-index:30;
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,.76);
      border-bottom:1px solid rgba(219,229,243,.9);
    }

    .nav{
      height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{display:flex;align-items:center;gap:12px}
    .mark{
      width:46px;height:46px;border-radius:16px;
      display:grid;place-items:center;
      color:#fff;font-weight:900;
      background:linear-gradient(135deg,var(--blue),#57a1ff);
    }

    nav ul{display:flex;gap:24px;list-style:none;padding:0;margin:0}
    nav a{text-decoration:none;color:var(--muted);font-weight:700}

    .actions{display:flex;gap:10px}

    .btn{
      border-radius:999px;
      padding:12px 18px;
      font-weight:800;
      text-decoration:none;
    }

    .btn.main{
      background:linear-gradient(135deg,var(--blue),#5da8ff);
      color:#fff;
    }

    .btn.sub{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    /* HERO */
    .hero{padding:46px 0 10px}

    h1{
      font-size:clamp(40px,6vw,70px);
      line-height:1;
      margin:18px 0;
    }

    .grad{
      background:linear-gradient(135deg,#2461eb,#52d8c9);
      -webkit-background-clip:text;
      color:transparent;
    }

    .hero p{
      color:var(--muted);
      line-height:1.8;
      max-width:600px;
    }

    .cta-row{
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    /* CATEGORY */
    .categories{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .cat{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px;
      text-decoration:none;
      color:var(--text);
    }

    /* PRODUCT */
    .products{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .product{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      padding:16px;
      text-decoration:none;
      color:var(--text);
    }

    .loading-box,.empty-box{
      background:#fff;
      border:1px dashed var(--line);
      border-radius:20px;
      padding:20px;
      text-align:center;
      color:var(--muted);
    }

    footer{text-align:center;padding:30px;color:#999}
  </style>
</head>

<body>

<header>
  <div class="container nav">
    <div class="brand">
      <div class="mark">S</div>
      <strong>SHiFT MEMBERS MARKET</strong>
    </div>

    <nav>
      <ul>
        <li><a href="index.html">TOP</a></li>
        <li><a href="products.html">商材一覧</a></li>
      </ul>
    </nav>

    <div class="actions">
      <a class="btn sub" href="login.html">ログイン</a>
      <a class="btn sub" href="mypage.html">マイページ</a>
    </div>
  </div>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1><span class="grad">会員専用の</span><br>卸仕入れマーケット</h1>
      <p>厳選されたメーカー商品を、会員限定で仕入れ可能。</p>

      <div class="cta-row">
        <a class="btn main" href="products.html">出品中の商品を見る</a>
        <a class="btn sub" href="#categories">カテゴリから探す</a>
      </div>
    </div>
  </section>

  <!-- CATEGORY -->
  <section id="categories">
    <div class="container">
      <h2>カテゴリ</h2>

      <div id="categoryLoading" class="loading-box">読み込み中...</div>
      <div id="categoryGrid" class="categories" style="display:none;"></div>
      <div id="categoryEmpty" class="empty-box" style="display:none;">なし</div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section>
    <div class="container">
      <h2>出品中商材</h2>

      <div id="productLoading" class="loading-box">読み込み中...</div>
      <div id="productGrid" class="products" style="display:none;"></div>
      <div id="productEmpty" class="empty-box" style="display:none;">なし</div>
    </div>
  </section>

</main>

<footer>© SHiFT MEMBERS MARKET</footer>

<script src="auth.js"></script>

<script>
(async function(){

  const catGrid = document.getElementById("categoryGrid");
  const prodGrid = document.getElementById("productGrid");

  const catLoading = document.getElementById("categoryLoading");
  const prodLoading = document.getElementById("productLoading");

  function esc(s){
    return String(s||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
  }

  function buildCategories(items){
    const map = {};

    items.forEach(i=>{
      if(!i.category) return;
      map[i.category] = (map[i.category]||0)+1;
    });

    return Object.keys(map).map(k=>({
      name:k,
      count:map[k]
    }));
  }

  const res = await SHIFT_AUTH.getProducts();
  const items = res.items || [];

  // カテゴリ
  const categories = buildCategories(items);

  catLoading.style.display="none";

  if(categories.length){
    catGrid.style.display="grid";
    catGrid.innerHTML = categories.map(c=>
      `<a class="cat" href="category.html?category=${encodeURIComponent(c.name)}">
        ${esc(c.name)} (${c.count})
      </a>`
    ).join("");
  }

  // 商品
  prodLoading.style.display="none";

  if(items.length){
    prodGrid.style.display="grid";
    prodGrid.innerHTML = items.slice(0,6).map(p=>
      `<a class="product" href="product-detail.html?id=${p.productId}">
        <strong>${esc(p.productName)}</strong>
        <div>${esc(p.price)}</div>
      </a>`
    ).join("");
  }

})();
</script>

</body>
</html>
