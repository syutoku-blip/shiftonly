<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHiFT MEMBERS MARKET | マイページ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--text:#182033;--muted:#667085;--line:#dbe5f3;--blue:#2f6df6;--shadow:0 18px 40px rgba(47,109,246,.10)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,"Noto Sans JP",sans-serif;color:var(--text);background:radial-gradient(circle at 0% 0%,#e6f0ff 0%,transparent 28%),radial-gradient(circle at 100% 0%,#e4fff6 0%,transparent 24%),linear-gradient(180deg,#f6f9ff 0%,#fbfdff 48%,#ffffff 100%)}
    .container{width:min(1120px,calc(100% - 32px));margin:auto}
    header{position:sticky;top:0;z-index:30;backdrop-filter:blur(12px);background:rgba(255,255,255,.76);border-bottom:1px solid rgba(219,229,243,.9)}
    .nav{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .brand{display:flex;align-items:center;gap:12px}
    .mark{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:20px;background:linear-gradient(135deg,var(--blue),#57a1ff);box-shadow:0 12px 24px rgba(47,109,246,.22)}
    .brand small{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5e8dff;font-weight:800}
    .brand strong{display:block;font-size:19px;letter-spacing:-.03em}

  .nav-menu{display:flex;gap:24px;list-style:none;padding:0;margin:0;align-items:center}
  .nav-menu>li{position:relative}
  .nav-menu>li>a{display:inline-flex;align-items:center;gap:8px}
  .has-dropdown{position:relative}
  .has-dropdown>a:after{content:"▾";font-size:11px;line-height:1;color:currentColor;transform:translateY(-1px)}
  .dropdown{position:absolute;top:calc(100% + 14px);left:0;min-width:190px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;display:none;box-shadow:0 18px 40px rgba(24,32,51,.12);z-index:80}
  .dropdown li{list-style:none}
  .dropdown a{display:block;padding:10px 12px;border-radius:12px;color:var(--text);font-size:14px;font-weight:800;white-space:nowrap}
  .dropdown a:hover{background:#f4f8ff;color:var(--blue)}
  .has-dropdown:hover .dropdown,.has-dropdown:focus-within .dropdown{display:block}

    nav a{text-decoration:none;color:var(--muted);font-weight:700;font-size:14px}
    nav a:hover,nav a.active{color:var(--text)}
    .btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:none;cursor:pointer;border-radius:999px;padding:13px 18px;font-weight:800;font-size:14px}
    .btn.sub{background:#fff;border:1px solid var(--line);color:var(--text)}
    .hero{padding:34px 0 14px}
    .hero-box{background:linear-gradient(135deg,#ffffff 0%,#f4f9ff 52%,#eef7ff 100%);border:1px solid var(--line);border-radius:32px;padding:28px;box-shadow:var(--shadow)}
    .eyebrow{color:#5f7de5;font-size:12px;text-transform:uppercase;letter-spacing:.18em;font-weight:900}
    h1{margin:12px 0 10px;font-size:clamp(34px,5vw,58px);line-height:.98;letter-spacing:-.06em}
    .hero-box p{max-width:820px;color:var(--muted);line-height:1.9;font-size:15px;margin:0}
    .member-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .pill{padding:10px 13px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:800;color:#536074}
    .layout{padding:22px 0 50px}
    .card{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:var(--shadow)}
    .section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:16px;flex-wrap:wrap}
    .section-head .sub{color:#5a7eff;font-size:12px;text-transform:uppercase;letter-spacing:.18em;font-weight:900}
    .section-head h2{margin:8px 0 0;font-size:30px;letter-spacing:-.05em}
    .section-head p{margin:8px 0 0;color:var(--muted);line-height:1.8;font-size:14px}
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .product-link{text-decoration:none;color:inherit;display:block}
    .product{background:#fff;border:1px solid var(--line);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);height:100%}
    .visual{height:180px;display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.9),transparent 20%),linear-gradient(135deg,#eef6ff 0%,#ffffff 52%,#e8fff7 100%)}
    .badge{position:absolute;left:14px;top:14px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;color:#596579}
    .body{padding:18px}
    .meta{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:#7793d7;font-weight:900}
    .product h4{margin:10px 0 10px;font-size:22px;letter-spacing:-.04em}
    .product p{margin:0;color:var(--muted);line-height:1.75;font-size:14px;min-height:48px}
    .bottom{display:flex;justify-content:space-between;align-items:end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid #edf2f8}
    .small{font-size:12px;color:var(--muted)}
    .score{background:#fff4f7;color:#8a4663;border:1px solid #ffd5e2;border-radius:16px;padding:10px 12px;font-weight:900;font-size:13px}
    .empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:28px;text-align:center;color:var(--muted);line-height:1.9}
    .loading{padding:20px;color:var(--muted);font-weight:700}
    footer{text-align:center;padding:24px 0 40px;color:#8b95a7;font-size:13px}
    @media(max-width:980px){.product-grid{grid-template-columns:1fr}}
    @media(max-width:760px){nav{display:none}}
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <div class="brand">
      <div class="mark">S</div>
      <div>
        <small>members wholesale</small>
        <strong>SHiFT MEMBERS MARKET</strong>
      </div>
    </div>
    <nav>
      <ul class="nav-menu">
        <li><a href="index.html">TOP</a></li>
        <li class="has-dropdown">
          <a href="products.html">商材ページ</a>
          <ul class="dropdown">
            <li><a href="category.html">カテゴリ一覧</a></li>
            <li><a href="product-list.html">商材一覧</a></li>
          </ul>
        </li>
      </ul>
    </nav>
    <button id="logoutBtn" class="btn sub" type="button">ログアウト</button>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container">
      <div class="hero-box">
        <div class="eyebrow">my page</div>
        <h1>マイページ</h1>
        <p>「❤ ほしい」を押した商品を確認できます。</p>
        <div class="member-meta">
          <div class="pill">会員番号: <span data-member-no>-</span></div>
          <div class="pill">氏名: <span data-member-name>-</span></div>
        </div>
      </div>
    </div>
  </section>

  <section class="layout">
    <div class="container">
      <div class="card">
        <div class="section-head">
          <div>
            <div class="sub">my wants</div>
            <h2>ほしい商品一覧</h2>
            <p>ほしいに登録した商品を表示しています。</p>
          </div>
        </div>

        <div id="loading" class="loading">読み込み中...</div>
        <div id="empty" class="empty" style="display:none;">
          まだ「❤ ほしい」を押した商品はありません。<br>
          気になる商品を見つけたら、商品詳細ページから登録してください。
        </div>
        <div id="productGrid" class="product-grid" style="display:none;"></div>
      </div>
    </div>
  </section>
</main>

<footer>© SHiFT MEMBERS MARKET</footer>

<script src="auth.js"></script>
<script>
(async function(){
  const ok = await window.SHIFT_AUTH.requireAuth({ redirectTo: 'login.html' });
  if (!ok) return;

  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');
  const gridEl = document.getElementById('productGrid');
  const memberNoEl = document.querySelector('[data-member-no]');
  const memberNameEl = document.querySelector('[data-member-name]');
  const logoutBtn = document.getElementById('logoutBtn');

  logoutBtn.addEventListener('click', async function(){
    if (!confirm('ログアウトしますか？')) return;

    try {
      await window.SHIFT_AUTH.logout();
      location.href = 'index.html';
    } catch (e) {
      alert('ログアウトに失敗しました。');
    }
  });

  function emojiByName(name){
    const text = String(name || '');
    if (text.indexOf('文房具') !== -1) return '🖋️';
    if (text.indexOf('化粧品') !== -1 || text.indexOf('コスメ') !== -1) return '💄';
    if (text.indexOf('食品') !== -1 || text.indexOf('お菓子') !== -1) return '🍵';
    if (text.indexOf('雑貨') !== -1) return '🏠';
    return '📦';
  }

  function esc(s){
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function renderItems(items){
    loadingEl.style.display = 'none';

    if (!items || !items.length) {
      emptyEl.style.display = 'block';
      gridEl.style.display = 'none';
      return;
    }

    emptyEl.style.display = 'none';
    gridEl.style.display = 'grid';
    gridEl.innerHTML = items.map(function(item){
      return `
        <a class="product-link" href="product-detail.html?id=${encodeURIComponent(item.productId || '')}">
          <div class="product">
            <div class="visual">
              <div class="badge">ほしい済み</div>
              ${esc(emojiByName(item.category))}
            </div>
            <div class="body">
              <div class="meta">${esc(item.category || 'product')}</div>
              <h4>${esc(item.productName || '')}</h4>
              <p>登録日時: ${esc(item.createdAtText || '-')}</p>
              <div class="bottom">
                <div class="small">詳細ページへ</div>
                <div class="score">確認する</div>
              </div>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  try {
    const verifyRes = await window.SHIFT_AUTH.verify();

    if (verifyRes && verifyRes.ok) {
      memberNoEl.textContent = verifyRes.memberNo || '-';
      memberNameEl.textContent = verifyRes.name || '-';
    }

    const wantsRes = await window.SHIFT_AUTH.getMyWants();

    if (!wantsRes.ok) {
      throw new Error(wantsRes.message || 'ほしい商品一覧の取得に失敗しました。');
    }

    const catalogRes = await window.SHIFT_AUTH.getCatalog();
    const catalogItems = (catalogRes && catalogRes.ok && catalogRes.items) ? catalogRes.items : [];

    const itemMap = new Map();
    catalogItems.forEach(function(item){
      itemMap.set(String(item.productId || ''), item);
    });

    const mergedItems = (wantsRes.items || []).map(function(want){
      const detail = itemMap.get(String(want.productId || '')) || {};
      return Object.assign({}, detail, want, {
        category: detail.category || '',
        productName: detail.productName || want.productName || want.productId || ''
      });
    });

    renderItems(mergedItems);
  } catch (err) {
    loadingEl.style.display = 'none';
    emptyEl.style.display = 'block';
    emptyEl.textContent = err.message || '情報の取得に失敗しました。';
  }
})();
</script>
</body>
</html>
